name: secret-scan

# Org security gate via the shared action
# (claudeaiportfolio/ai-infra-templates/action): a deterministic, blocking
# gitleaks secret scan on every push/PR, plus the advisory Claude review on PRs.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: claudeaiportfolio/ai-infra-templates/action@main
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
